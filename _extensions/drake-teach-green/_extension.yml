title: "Drake Teach Green"
author: John M. Drake
version: 0.1.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      author: John M. Drake
      date-format: "MMMM D, YYYY"
      template-partials:
        - ../shared/title-slide.html
      theme: [default, ../shared/teach-base.css, green.css]
    beamer:
      date-format: "MMMM D, YYYY"
      include-in-header:
        - green-beamer.tex
        - ../shared/beamer-teach-base.tex
