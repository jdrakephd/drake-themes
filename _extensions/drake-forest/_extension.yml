title: Drake Forest Theme
author: John Drake
version: 0.1.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      author: "John M. Drake"
      date-format: "MMMM D, YYYY"
      template-partials:
        - ../shared/title-slide.html
      theme: [default, ../shared/base.css, forest.css]
    beamer:
      date-format: "MMMM D, YYYY"
      include-in-header:
        - forest-beamer.tex
        - ../shared/beamer-academic-base.tex
